# Docker Compose Configuration for Full-Stack Development
# This file orchestrates three services: React Frontend, Laravel Backend, and Nginx Reverse Proxy
# 
# Services communicate over a bridge network (app-network)
# Frontend and Backend have hot reload enabled for development
# Local MySQL database is accessed via host.docker.internal
# All services bind through Nginx on port 3000

version: '3.9'

services:
  # ============================================
  # FRONTEND SERVICE: React (Create React App)
  # ============================================
  frontend:
    container_name: frontend
    build:
      context: ./msbteWebAdminFront  # Build from React project directory
      dockerfile: Dockerfile.dev     # Use development Dockerfile
    volumes:
      # Mount entire React app for live code editing
      - ./msbteWebAdminFront:/app
      # Keep node_modules in a named volume (not synced from host) for performance
      # This prevents watching 1000s of files on host machine
      - /app/node_modules
    environment:
      # Enable file watching in Docker containers (required for Docker)
      - CHOKIDAR_USEPOLLING=true
      # Additional polling for webpack watch mode
      - WATCHPACK_POLLING=true
      # Set Node environment to development for CRA
      - NODE_ENV=development
    networks:
      # Connect to app-network bridge for inter-service communication
      - app-network


  # ============================================
  # BACKEND SERVICE: Laravel (PHP 8.2)
  # ============================================
  backend:
    container_name: backend
    build:
      context: ./msbteWebAdminBack  # Build from Laravel project directory
      dockerfile: Dockerfile.dev    # Use development Dockerfile
    volumes:
      # Mount Laravel app for live code editing
      - ./msbteWebAdminBack:/var/www/html
      # Mount SSL certificates for HTTPS support
      - ./ssl:/etc/ssl
    ports:
      # Expose port 8000 for direct backend access (for testing/debugging)
      # Also used internally by Nginx for routing /api/* requests
      - "8000:8000"
    extra_hosts:
      # Allow container to access MySQL on host machine
      # Use this hostname in .env DB_HOST instead of localhost
      - "host.docker.internal:host-gateway"
    environment:
      # Laravel environment configuration
      APP_ENV: local                           # Development environment
      APP_DEBUG: "true"                        # Enable debug mode
      APP_URL: http://localhost:3000           # Application URL for links/redirects
      
      # Database configuration for local MySQL
      DB_CONNECTION: mysql                     # Database driver
      DB_HOST: host.docker.internal            # Access host machine MySQL
      DB_PORT: 3306                            # MySQL default port
      DB_DATABASE: msbteWeb2                   # Database name (create if not exists)
      DB_USERNAME: root                        # MySQL user
      DB_PASSWORD: "2001"                      # MySQL password
      LARAVEL_SAIL: "true"                     # Enable Sail-specific features
    networks:
      # Connect to app-network for communication with frontend and nginx
      - app-network
 
  # ============================================
  # REVERSE PROXY SERVICE: Nginx
  # ============================================
  nginx:
    container_name: nginx
    # Use official Nginx image (no custom build needed)
    image: nginx:latest
    volumes:
      # Mount custom nginx config for routing and proxying
      - ./nginx.conf:/etc/nginx/nginx.conf
      # Mount SSL certificates for HTTPS
      - ./ssl:/etc/ssl
    ports:
      # HTTP: All traffic comes through port 3000
      # - Routes /api/* to backend:8000
      # - Routes /* to frontend:3000
      - "3000:3000"
      # HTTPS: Optional, requires SSL certificates
      - "443:443"
    depends_on:
      # Ensure backend and frontend start before nginx
      # (Nginx won't start if services it proxies aren't available)
      - backend
      - frontend
    networks:
      # Connect to app-network to reach backend and frontend services
      - app-network

# ============================================
# BRIDGE NETWORK
# ============================================
networks:
  app-network:
    driver: bridge
    # Allows all services to communicate by container name
    # Example: frontend can reach backend at http://backend:8000